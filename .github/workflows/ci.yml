name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run tests
        env:
          # Unit tests transitively import src/lib/supabase.ts, which throws at
          # import time when these are missing (see PR 55). The tested code is
          # all pure and never calls the client, so dummy values are enough —
          # same fallback the e2e job uses below.
          VITE_SUPABASE_URL: 'https://dummy.supabase.co'
          VITE_SUPABASE_ANON_KEY: 'dummy-anon-key-for-unit-tests'
        run: npm run test:run

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # e2e is non-blocking for now (continue-on-error). The public flows
  # (e2e/public.spec.ts) run against the dev server with throwaway Supabase env
  # so they pass without a backend; the authed flows (e2e/authed.spec.ts) stay
  # test.skip until a dedicated TEST Supabase project + teacher creds are added
  # as repo secrets — NEVER point these at prod. Flip continue-on-error off (and
  # add e2e to required checks) once those secrets exist. See e2e/README.md.
  e2e:
    runs-on: ubuntu-latest
    needs: [build]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run e2e
        env:
          # Fall back to dummy values so the dev server boots and the public
          # specs run; real secrets (when present) enable the authed specs.
          VITE_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL || 'https://dummy.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY || 'dummy-anon-key-for-public-e2e' }}
          E2E_TEACHER_EMAIL: ${{ secrets.E2E_TEACHER_EMAIL }}
          E2E_TEACHER_PASSWORD: ${{ secrets.E2E_TEACHER_PASSWORD }}
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
