<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- PR 80: http-equiv refuerza el charset para WebViews Android que
         ignoran <meta charset> cuando los archivos se sirven via file://
         o capacitor:// (sucede en Android 8-11). Sin esto, chars Unicode
         multibyte como ×, →, — pueden renderizarse como Ã, â†', etc. -->
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clasloop — Your daily warmups & exit tickets</title>

    <!-- SEO + social sharing. Previously the page had only a <title>: sharing
         the link on WhatsApp/Slack/X/iMessage produced no preview at all.
         og:url is intentionally omitted until the production domain is final
         (an absolute URL is required and a wrong canonical hurts more than
         none). og:image points at a stopgap for now; the real 1200×630
         /og-image.png is produced in a later landing PR. -->
    <meta name="description" content="Turn any file or topic into a class warmup or exit ticket in 30 seconds. AI writes and verifies the questions — you launch them live or print a beautiful test. Built for the daily class routine." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Clasloop" />
    <meta property="og:title" content="Clasloop — Your daily warmups & exit tickets" />
    <meta property="og:description" content="Any file or topic in. Verified, ready-to-use questions out. Launch them live in class or print a polished test — built for the daily routine." />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Clasloop — Your daily warmups & exit tickets" />
    <meta name="twitter:description" content="Any file or topic in. Verified, ready-to-use questions out. Launch live or print a polished test." />
    <meta name="twitter:image" content="/og-image.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      PR 71: cleanup de fonts. Antes cargábamos 5 familias con ~22 weights:
        - Instrument Serif (italic+regular)  ← DEAD CODE, nadie lo usaba
        - DM Sans (300, 400, 500, 600, 700)  ← solo 400/500/600/700 se usan
        - JetBrains Mono (400, 500, 600, 700)
        - Outfit (400, 500, 600, 700, 800)   ← 800 solo en 2 lugares
        - Inter (400, 500, 600)               ← solo 600 se usa explícito
      Ahora: 4 familias, ~10 weights total. Ahorro ~50% de font traffic
      en el initial load (estimado -200-400KB).

      Por qué cada cambio:
        - Quitamos Instrument Serif: nadie lo importa (audit con grep).
        - DM Sans: dropeamos 300 (light, sin usos). Mantenemos 700 porque
          es el bold default del browser para <strong>/<b> (si no está,
          el browser hace synthesized bold que se ve feo).
        - Outfit: dropeamos 800 (solo 2 usos — caen a 700 que es igual de bold).
        - Inter: solo 600 (único weight que se usa explícito en el código).
    -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Inter:wght@600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
