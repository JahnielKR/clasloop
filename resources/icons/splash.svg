<svg width="2732" height="2732" viewBox="0 0 2732 2732" xmlns="http://www.w3.org/2000/svg">
  <!--
    Splash screen Clasloop.
    Variante B: logomark + wordmark CLASLOOP centrados sobre fondo #1a1a1a.

    Canvas 2732×2732 = el tamaño "univ_canvas" que Capacitor usa para
    splashes — escala automáticamente a portrait/landscape de cualquier
    densidad. El logo + wordmark están en el centro, con suficiente
    aire alrededor para que no se corten en aspect ratios extremos.

    El crop visible típico en portrait es el cuadrado central (≈ 1080
    px en cels modernos). El logo está dimensionado para esa zona.
  -->
  <rect width="2732" height="2732" fill="#1a1a1a"/>

  <!-- Logomark centrado (más arriba que el centro absoluto, para hacer
       espacio al wordmark debajo) -->
  <g transform="translate(1366, 1280)">
    <circle cx="0" cy="0" r="140" fill="none" stroke="#ffffff" stroke-width="24"/>
    <circle cx="0" cy="0" r="68" fill="#ffffff"/>
  </g>

  <!-- Wordmark debajo. Outfit / sans-serif uniforme. Letter-spacing
       generoso (tono editorial, consistente con la app). -->
  <text x="1366" y="1530"
        text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="78"
        font-weight="500"
        letter-spacing="14"
        fill="#ffffff">CLASLOOP</text>
</svg>
