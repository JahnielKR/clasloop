<svg width="432" height="432" viewBox="0 0 432 432" xmlns="http://www.w3.org/2000/svg">
  <!--
    Adaptive icon foreground (Android 8+).

    Canvas 432×432, safe zone es el círculo central de radio ~144
    (66% de 432÷2). El logo debe estar dentro de esa zona.

    NO incluye background — el background es un layer separado
    (@color/ic_launcher_background → #F0F0EC).

    Logo: cuadrado redondeado con gradiente azul, dimensionado para
    quedar dentro de la safe zone con un poquito de aire.
  -->
  <defs>
    <linearGradient id="cl-fg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38A1F0" />
      <stop offset="1" stop-color="#1452A8" />
    </linearGradient>
  </defs>

  <!-- Logo flotando dentro de la safe zone.
       Tamaño: 200×200 px (queda dentro de 264 de safe zone con padding).
       Posición: centrado en (216, 216) → top-left (116, 116). -->
  <g transform="translate(116, 116)">
    <rect width="200" height="200" rx="44" fill="url(#cl-fg-grad)"/>

    <!-- Reloj centrado en (100, 100) -->
    <circle cx="100" cy="100" r="57" fill="none" stroke="#fff" stroke-width="12.5"/>

    <!-- Manecillas -->
    <path d="M100 69 L100 100 L122 110"
          fill="none" stroke="#fff" stroke-width="14"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Sol arriba del reloj -->
    <circle cx="100" cy="38" r="10" fill="#FFEAA7"/>
  </g>
</svg>
